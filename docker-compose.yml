services:

  qdrant:
    image: qdrant/qdrant
    container_name: rag-qdrant
    ports:
      - "6333:6333"
    volumes:
      - ./qdrant_data:/qdrant/storage

  rag-server:
    build: ./rag-server
    container_name: rag-server
    ports:
      - "8000:8000"
    volumes:
      - /home/ubuntu/syncthing/data/valut:/vault/obsidian
      - /home/ubuntu/models:/models
    depends_on:
      - qdrant
